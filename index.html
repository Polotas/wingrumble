<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Wing Rumble</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
</head>
<body class="phase-loading splash-active">
  <div id="splash-screen" class="splash-screen" aria-hidden="false">
    <img
      class="splash-screen__logo"
      src="assets/logo.png"
      alt="Wing Rumble"
      decoding="async"
      fetchpriority="high"
    />
  </div>
  <div id="app-root" class="app-root"></div>
  <button
    type="button"
    id="btn-global-options"
    class="btn-global-fullscreen btn-global-options"
    aria-label="Opções"
    data-i18n-aria-label="global.options"
  >
    <svg
      class="btn-global-fullscreen__icon"
      width="22"
      height="22"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
      focusable="false"
    >
      <path
        d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"
        stroke="currentColor"
        stroke-width="2"
      />
      <path
        d="M19.4 15a8.6 8.6 0 0 0 .1-1l1.8-1.4-1.7-3-2.2.6a8.2 8.2 0 0 0-1.7-1l-.3-2.2H8.6l-.3 2.2a8.2 8.2 0 0 0-1.7 1l-2.2-.6-1.7 3L4.5 14a8.6 8.6 0 0 0 .1 1l-1.9 1.4 1.7 3 2.2-.6a8.2 8.2 0 0 0 1.7 1l.3 2.2h6.8l.3-2.2a8.2 8.2 0 0 0 1.7-1l2.2.6 1.7-3-1.9-1.4Z"
        stroke="currentColor"
        stroke-width="2"
        stroke-linejoin="round"
      />
    </svg>
  </button>
  <button
    type="button"
    id="btn-global-fullscreen"
    class="btn-global-fullscreen"
    aria-label="Tela cheia"
    data-i18n-aria-label="global.fullscreen.enter"
  >
    <svg
      class="btn-global-fullscreen__icon"
      width="22"
      height="22"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
      focusable="false"
    >
      <path
        d="M9 5H6.5C5.67 5 5 5.67 5 6.5V9M15 5H17.5C18.33 5 19 5.67 19 6.5V9M9 19H6.5C5.67 19 5 18.33 5 17.5V15M15 19H17.5C18.33 19 19 18.33 19 17.5V15"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      />
    </svg>
  </button>

  <div
    id="options-modal"
    class="options-modal"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="options-title"
  >
    <button
      type="button"
      class="options-modal__backdrop"
      data-options-close
      aria-label="Fechar"
      data-i18n-aria-label="options.close"
    ></button>
    <div class="options-modal__card game-panel">
      <div class="options-modal__header">
        <h2 id="options-title" class="options-modal__title" data-i18n="options.title">Opções</h2>
        <button type="button" class="options-modal__icon-close" data-options-close aria-label="Fechar" data-i18n-aria-label="options.close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
            <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="options-modal__body">
        <label class="options-modal__label" for="options-language">
          <span data-i18n="options.language">Idioma</span>
        </label>
        <select id="options-language" class="options-modal__select">
          <option value="pt-BR" data-i18n="options.language.ptBR">Português (Brasil)</option>
          <option value="en" data-i18n="options.language.en">English</option>
        </select>

        <div class="options-modal__row">
          <label class="options-modal__label" for="options-bg-volume">
            <span data-i18n="options.volume.bg">Música (BG)</span>
          </label>
          <output id="options-bg-volume-value" class="options-modal__value">60%</output>
        </div>
        <input id="options-bg-volume" class="options-modal__range" type="range" min="0" max="100" step="1" value="60" />

        <div class="options-modal__row">
          <label class="options-modal__label" for="options-sfx-volume">
            <span data-i18n="options.volume.sfx">Efeitos (SFX)</span>
          </label>
          <output id="options-sfx-volume-value" class="options-modal__value">80%</output>
        </div>
        <input id="options-sfx-volume" class="options-modal__range" type="range" min="0" max="100" step="1" value="80" />
      </div>
    </div>
  </div>
  <!-- Import dinâmico com query única evita ficar preso a main.js antigo em cache após refresh. -->
  <script type="module">
    // Splash inicial (logo) antes do painel de loading.
    const SPLASH_MS = 5000;
    const SPLASH_OUT_MS = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches
      ? 0
      : 420;
    const splashEl = document.getElementById("splash-screen");

    function startApp() {
      import(`./js/main.js?m=${Date.now()}`).catch((e) => {
        const r = document.getElementById("app-root");
        if (r) {
          r.innerHTML =
            "<p style=\"padding:24px;font-family:system-ui\">Falha ao carregar o script principal. Recarregue a página.</p>";
        }
        console.error(e);
      });
    }

    window.setTimeout(() => {
      if (!splashEl) {
        document.body.classList.remove("splash-active");
        startApp();
        return;
      }
      splashEl.classList.add("splash-screen--hiding");
      window.setTimeout(() => {
        splashEl.remove();
        document.body.classList.remove("splash-active");
        startApp();
      }, SPLASH_OUT_MS);
    }, SPLASH_MS);
  </script>
</body>
</html>
